<!DOCTYPE html>
<html lang="es" ng-app="miApp">
<head>
    <meta charset="UTF-8">
    <title>Mi primera app con AngularJS</title>

   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body>

<div class="container" ng-controller="MainController">
    <h1 class="text-center">Ejemplo AngularJS + Bootstrap</h1>

    <div class="panel panel-primary">
        <div class="panel-heading">Saludo dinámico</div>
        <div class="panel-body">

            <!-- Input -->
            <label>Escribe tu nombre:</label>
            <input type="text" class="form-control" ng-model="nombre">

            <br>

            <!-- Botón -->
            <button class="btn btn-success" ng-click="saludar()">
                Saludar
            </button>

            <hr>

            <!-- Resultado -->
            <h3>{{ mensaje }}</h3>

        </div>
    </div>
</div>

<!-- Script AngularJS -->
<script>
    // 1. Módulo principal
    var app = angular.module('miApp', []);

    // 2. Controlador
    app.controller('MainController', function($scope) {

        // Variable inicial
        $scope.nombre = "";

        // Función que se ejecuta al hacer clic
        $scope.saludar = function() {
            $scope.mensaje = "Hola " + $scope.nombre + ", bienvenido a AngularJS 🚀";
        };

    });
</script>

</body>
</html>
