<button onclick="saludar()">Haz clic</button>

<p id="parrafo">Este texto cambia de color</p>
<button onclick="cambiarColor()">Color</button>

<p id="texto">Texto original</p>
<button onclick="cambiarTexto()">Cambiar</button>

<input type="text" id="nombre" placeholder="Escribe tu nombre">
<button onclick="validar()">Validar</button>



<script>
function saludar() {
    alert("Hola Mundo!");
}
function cambiarColor() {
    document.getElementById("parrafo").style.color = "red";
}
function cambiarTexto() {
    document.getElementById("texto").innerHTML = "Texto cambiado 🚀";
}
function validar() {
    let valor = document.getElementById("nombre").value;

    if (valor === "") {
        alert("El campo está vacío");
    } else {
        alert("Correcto");
    }
}

</script>
